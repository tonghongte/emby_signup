name: Build and Push to GHCR

# 将镜像推送至 GitHub Container Registry (ghcr.io)
# 触发条件：发布 Release，或在 Actions 页面手动触发 (workflow_dispatch)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # 推送镜像到 GHCR 必需
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 内置 token，无需额外配置 secret

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 镜像名自动取仓库全名，例如 ghcr.io/tonghongte/emby_signup
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
